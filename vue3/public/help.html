<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帮助</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #222;
      background: #f5f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    main {
      width: min(720px, 100%);
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
    }

    p {
      margin: 0 0 24px;
      color: #666;
      font-size: 16px;
      line-height: 1.8;
    }

    img {
      width: min(420px, 100%);
      border-radius: 6px;
      display: block;
      margin: 0 auto 24px;
    }

    a {
      color: #fff;
      background: #ff3769;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 22px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main>
    <h1>帮助中心？</h1>
    <p>显然我懒得搞什么帮助页面</p>
    <img src="/Rick%20Astley%20GIF.gif" alt="Rick Astley">
    <a href="/index">返回首页</a>
  </main>
</body>
</html>
