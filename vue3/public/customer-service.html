<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客服支持</title>
  <style>
    :root {
      --app-bg: #f6f7fb;
      --app-surface: #ffffff;
      --app-border: #e4e7ef;
      --app-primary: #18181b;
      --app-accent: #f59e0b;
      --app-text: #18181b;
      --app-text-muted: #71717a;
      --app-shadow: 0 18px 44px rgba(24, 24, 27, .14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--app-text);
      background-color: var(--app-bg);
      background-image:
        linear-gradient(rgba(24, 24, 27, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 24, 27, .04) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    main {
      width: min(720px, 100%);
      background: var(--app-surface);
      border: 1px solid var(--app-border);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      box-shadow: var(--app-shadow);
      border-top: 7px solid var(--app-accent);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
    }

    p {
      margin: 0 0 24px;
      color: var(--app-text-muted);
      font-size: 16px;
      line-height: 1.8;
    }

    img {
      width: min(420px, 100%);
      border-radius: 8px;
      display: block;
      margin: 0 auto 24px;
    }

    a {
      color: #fff;
      background: var(--app-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 22px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
    }

    a:hover {
      color: #111;
      background: var(--app-accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>个人项目还需要有客服支持？</h1>
    <p>你是认真的吗？</p>
    <img src="/Rick%20Astley%20GIF.gif" alt="客服支持">
    <a href="/index">返回首页</a>
  </main>
</body>
</html>
