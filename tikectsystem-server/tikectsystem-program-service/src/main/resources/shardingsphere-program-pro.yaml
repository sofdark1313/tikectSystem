dataSources: 
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: ${PROGRAM_DATASOURCE_0_URL}
    username: ${PROGRAM_DATASOURCE_USERNAME}
    password: ${PROGRAM_DATASOURCE_PASSWORD}
    hikari:
      max-lifetime: 60000

  ds_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: ${PROGRAM_DATASOURCE_1_URL}
    username: ${PROGRAM_DATASOURCE_USERNAME}
    password: ${PROGRAM_DATASOURCE_PASSWORD}
    hikari:
      max-lifetime: 60000
    
rules:
  - !SHARDING
    tables:
      d_program:
        actualDataNodes: ds_${0..1}.d_program_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: databaseProgramModModel
        tableStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: tableProgramModModel
      d_program_group:
        actualDataNodes: ds_${0..1}.d_program_group_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: databaseProgramGroupModModel
        tableStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: tableProgramGroupModModel
      d_program_show_time:
        actualDataNodes: ds_${0..1}.d_program_show_time_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: program_id
            shardingAlgorithmName: databaseProgramShowTimeModModel
        tableStrategy:
          standard:
            shardingColumn: program_id
            shardingAlgorithmName: tableProgramShowTimeModModel
      d_seat:
        actualDataNodes: ds_${0..1}.d_seat_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: program_id
            shardingAlgorithmName: databaseSeatModModel
        tableStrategy:
          standard:
            shardingColumn: program_id
            shardingAlgorithmName: tableSeatModModel
      d_ticket_category:
        actualDataNodes: ds_${0..1}.d_ticket_category_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: program_id
            shardingAlgorithmName: databaseTicketCategoryModModel
        tableStrategy:
          standard:
            shardingColumn: program_id
            shardingAlgorithmName: tableTicketCategoryModModel
      d_program_record_task:
        actualDataNodes: ds_${0..1}.d_program_record_task_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: create_time
            shardingAlgorithmName: databaseProgramRecordTaskModModel
        tableStrategy:
          standard:
            shardingColumn: create_time
            shardingAlgorithmName: tableProgramRecordTaskModModel
      order_request_result:
        actualDataNodes: ds_${0..1}.order_request_result_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: order_number
            shardingAlgorithmName: databaseOrderRequestResultModModel
        tableStrategy:
          standard:
            shardingColumn: order_number
            shardingAlgorithmName: tableOrderRequestResultModModel
    broadcastTables:
      - d_program_category
    shardingAlgorithms:
      databaseProgramModModel:
        type: MOD
        props:
          sharding-count: 2
      tableProgramModModel:
        type: MOD
        props:
          sharding-count: 2
      databaseProgramGroupModModel:
        type: MOD
        props:
          sharding-count: 2
      tableProgramGroupModModel:
        type: MOD
        props:
          sharding-count: 2
      databaseProgramShowTimeModModel:
        type: MOD
        props:
          sharding-count: 2
      tableProgramShowTimeModModel:
        type: MOD
        props:
          sharding-count: 2
      databaseSeatModModel:
        type: MOD
        props:
          sharding-count: 2
      tableSeatModModel:
        type: MOD
        props:
          sharding-count: 2
      databaseTicketCategoryModModel:
        type: MOD
        props:
          sharding-count: 2
      tableTicketCategoryModModel:
        type: MOD
        props:
          sharding-count: 2
      databaseProgramRecordTaskModModel:
        type: HASH_MOD
        props:
          sharding-count: 2
      tableProgramRecordTaskModModel:
        type: HASH_MOD
        props:
          sharding-count: 2
      databaseOrderRequestResultModModel:
        type: MOD
        props:
          sharding-count: 2
      tableOrderRequestResultModModel:
        type: MOD
        props:
          sharding-count: 2
props:
  sql-show: true
