dataSources:    
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: ${PAY_DATASOURCE_0_URL}
    username: ${PAY_DATASOURCE_USERNAME}
    password: ${PAY_DATASOURCE_PASSWORD}

  ds_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: ${PAY_DATASOURCE_1_URL}
    username: ${PAY_DATASOURCE_USERNAME}
    password: ${PAY_DATASOURCE_PASSWORD}
    
rules:
  # 分库分表规则
  - !SHARDING
    tables:    
      d_pay_bill:
        actualDataNodes: ds_${0..1}.d_pay_bill_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: out_order_no
            shardingAlgorithmName: databasePayHashModModel   
        tableStrategy:
          standard:
            shardingColumn: out_order_no
            shardingAlgorithmName: tablePayHashModModel
      d_refund_bill:
        actualDataNodes: ds_${0..1}.d_refund_bill_${0..1}
        databaseStrategy:
          standard:
            shardingColumn: out_order_no
            shardingAlgorithmName: databaseRefundHashModModel
        tableStrategy:
          standard:
            shardingColumn: out_order_no
            shardingAlgorithmName: tableRefundHashModModel      
    shardingAlgorithms:
      databasePayHashModModel:
        type: HASH_MOD
        props:
          sharding-count: 2
      tablePayHashModModel:
        type: HASH_MOD
        props:
          sharding-count: 2
      databaseRefundHashModModel:
        type: HASH_MOD
        props:
          sharding-count: 2
      tableRefundHashModModel:
        type: HASH_MOD
        props:
          sharding-count: 2
props:
  sql-show: true
